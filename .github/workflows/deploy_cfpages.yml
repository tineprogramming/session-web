name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          version: latest

      - name: Get Git commit hash
        id: git
        run: |
          echo "GIT_HASH_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Setup environment
        run: |
          mv .env.sample .env
          rm -rf .git

      - name: Install dependencies and build
        run: |
          bun install
          VITE_GIT_COMMIT_HASH=${{ env.GIT_HASH_SHORT }} bun run build

      - name: Deploy to Cloudflare Pages (preview)
        run: |
          npx wrangler pages deploy ./dist --project-name sessionweb --branch preview

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-dist
          path: dist/
          retention-days: 1

  approve-production:
    needs: deploy-preview
    runs-on: ubuntu-latest
    steps:
      - name: Wait for manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ github.actor }}
          issue-title: "Approve production deployment"
          issue-body: "Review the preview deployment and approve for production"
  
  deploy-production:
    needs: approve-production
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-dist
          path: dist/
  
      - name: Deploy to Cloudflare Pages (production)
        run: |
          npx wrangler pages deploy ./dist --project-name sessionweb
